<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>Cannon Roguelike</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="CannonRL">
    <link rel="apple-touch-icon" href="img/icon-512.png">
    <link rel="apple-touch-startup-image" href="img/icon-512.png">

    <!-- Google Fonts pour le jeu -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400..900&display=swap" rel="stylesheet">

    <script>
        // CONFIGURATION DE LA POLICE DU JEU
        window.GAME_FONT = "'Orbitron', sans-serif";
    </script>
</head>

<body>
    <div id="game-container">
        <canvas id="gameCanvas" width="600" height="800"></canvas>

        <div id="main-menu" class="overlay-menu">
            <h2>Cannon Roguelike</h2>
            <p>Choisis un mode pour commencer</p>
            <div class="menu-buttons">
                <button id="start-btn" class="menu-btn">Start</button>
                <button id="boss-rush-btn" class="menu-btn">Boss Rush (3s/wave)</button>
            </div>
        </div>

        <div id="pause-menu" class="overlay-menu hidden">
            <h2>Pause</h2>
            <div class="menu-buttons">
                <button id="resume-btn" class="menu-btn">Resume</button>
                <button id="restart-btn" class="menu-btn">Restart Run</button>
                <button id="pause-main-btn" class="menu-btn">Main Menu</button>
            </div>
        </div>

        <div id="game-over-menu" class="overlay-menu hidden">
            <h2 class="died-title">YOU DIED</h2>
            <div id="game-over-stats" class="stats-container"></div>
            <div class="menu-buttons">
                <button id="gameover-restart-btn" class="menu-btn">Restart Run</button>
                <button id="gameover-main-btn" class="menu-btn">Main Menu</button>
            </div>
        </div>

        <div id="upgrade-menu" class="overlay-menu hidden">
            <h2 id="upgrade-title">Boss Defeated!</h2>
            <p>Select a reward upgrade</p>
            <div id="upgrade-options">
                <!-- Buttons will be injected here by JS -->
            </div>
        </div>
    </div>

    <script src="js/input.js"></script>
    <script src="js/upgrades.js"></script>
    <script src="js/projectile.js"></script>
    <script src="js/enemy.js"></script>
    <script src="js/boss.js"></script>
    <script src="js/player.js"></script>
    <script src="js/background.js"></script>
    <script src="js/game.js"></script>
    <script src="js/main.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('Service Worker registered!'))
                    .catch(err => console.log('Service Worker registration failed: ', err));
            });
        }
    </script>
</body>

</html>
